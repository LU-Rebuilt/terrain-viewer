name: CI

on:
  pull_request:
    branches: [main]

jobs:
  commit-lint:
    name: Conventional Commits
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate PR commits
        run: |
          PATTERN='^(feat|fix|docs|style|refactor|perf|test|build|ci|chore|revert)(\(.+\))?!?: .+'
          FAILED=0
          while IFS= read -r msg; do
            if ! echo "$msg" | grep -qE "$PATTERN"; then
              echo "::error::Bad commit message: $msg"
              echo "  Expected format: type(scope): description"
              echo "  Types: feat fix docs style refactor perf test build ci chore revert"
              FAILED=1
            fi
          done < <(git log --format='%s' origin/main..HEAD)

          if [ "$FAILED" -eq 1 ]; then
            echo ""
            echo "All commits must follow Conventional Commits: https://www.conventionalcommits.org"
            exit 1
          fi
          echo "All commits follow conventional commit format."

  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            name: linux-x86_64
            artifact: terrain-viewer-linux-x86_64
          - os: windows-latest
            name: windows-x86_64
            artifact: terrain-viewer-windows-x86_64
          - os: macos-14
            name: macos-arm64
            artifact: terrain-viewer-macos-arm64
            cmake_extra: -DCMAKE_OSX_ARCHITECTURES=arm64
          - os: macos-14
            name: macos-x86_64
            artifact: terrain-viewer-macos-x86_64
            cmake_extra: -DCMAKE_OSX_ARCHITECTURES=x86_64

    name: Build (${{ matrix.name }})
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Qt6
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.7.*'
          cache: true

      - name: Install dependencies (Linux)

        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y zlib1g-dev libsqlite3-dev libgl1-mesa-dev

      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: brew install sqlite3

      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release -DCMAKE_PREFIX_PATH=${{ env.Qt6_DIR }} ${{ matrix.cmake_extra }}

      - name: Build
        run: cmake --build build --config Release --parallel

      - name: Package (Linux)
        if: runner.os == 'Linux'
        run: |
          mkdir -p dist
          cp build/terrain_viewer dist/ 2>/dev/null || true;
          tar -czf ${{ matrix.artifact }}.tar.gz -C dist .

      - name: Package (macOS)
        if: runner.os == 'macOS'
        run: |
          mkdir -p dist
          APP=dist/TerrainViewer.app
          mkdir -p "$APP/Contents/MacOS"
          cp build/terrain_viewer "$APP/Contents/MacOS/" 2>/dev/null || true
          cat > "$APP/Contents/Info.plist" << 'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>CFBundleExecutable</key><string>terrain_viewer</string>
            <key>CFBundleName</key><string>TerrainViewer</string>
            <key>CFBundleIdentifier</key><string>com.lu-rebuilt.terrainviewer</string>
            <key>CFBundleVersion</key><string>1.0</string>
          </dict>
          </plist>
          PLIST
          macdeployqt "$APP" -verbose=1
          cd dist && zip -r ../${{ matrix.artifact }}.zip TerrainViewer.app

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          mkdir -p dist
          cp build/Release/*.exe dist/ 2>/dev/null || true
          for exe in dist/*.exe; do windeployqt "$exe" 2>/dev/null || true; done
          7z a ${{ matrix.artifact }}.zip ./dist/*

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}.*
