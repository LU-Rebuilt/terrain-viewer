name: Release

on:
  push:
    tags: ['v*']

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            name: linux-x86_64
            artifact: terrain-viewer-linux-x86_64
          - os: windows-latest
            name: windows-x86_64
            artifact: terrain-viewer-windows-x86_64
          - os: macos-14
            name: macos-arm64
            artifact: terrain-viewer-macos-arm64
          - os: macos-14
            name: macos-x86_64
            artifact: terrain-viewer-macos-x86_64

    name: Build (${{ matrix.name }})
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      # ── Static Qt6 (cached) ────────────────────────────────────────
      - name: Cache static Qt6
        id: cache-qt
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/qt6-static
          key: qt6-static-6.7.3-${{ runner.os }}-${{ runner.arch }}

      - name: Install Qt6 build deps (Linux)
        if: runner.os == 'Linux' && steps.cache-qt.outputs.cache-hit != 'true'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgl1-mesa-dev libfontconfig1-dev libfreetype-dev \
            libx11-dev libx11-xcb-dev libxext-dev libxfixes-dev libxi-dev libxrender-dev \
            libxcb1-dev libxcb-cursor-dev libxcb-glx0-dev libxcb-icccm4-dev \
            libxcb-image0-dev libxcb-keysyms1-dev libxcb-randr0-dev libxcb-render-util0-dev \
            libxcb-shape0-dev libxcb-shm0-dev libxcb-sync-dev libxcb-util-dev \
            libxcb-xfixes0-dev libxcb-xinerama0-dev libxcb-xkb-dev libxkbcommon-dev \
            libxkbcommon-x11-dev ninja-build

      - name: Install Qt6 build deps (macOS)
        if: runner.os == 'macOS' && steps.cache-qt.outputs.cache-hit != 'true'
        run: brew install ninja

      - name: Build static Qt6 (Unix)
        if: steps.cache-qt.outputs.cache-hit != 'true' && runner.os != 'Windows'
        run: |
          git clone --depth 1 --branch v6.7.3 https://code.qt.io/qt/qt5.git qt6-src
          cd qt6-src && perl init-repository --module-subset=qtbase && cd ..
          mkdir qt6-build && cd qt6-build
          ../qt6-src/configure -static -release \
            -prefix "${{ github.workspace }}/qt6-static" \
            -no-pch -nomake examples -nomake tests -submodules qtbase -- -GNinja
          cmake --build . --parallel
          cmake --install .
        timeout-minutes: 45

      - name: Build static Qt6 (Windows)
        if: steps.cache-qt.outputs.cache-hit != 'true' && runner.os == 'Windows'
        shell: cmd
        run: |
          git clone --depth 1 --branch v6.7.3 https://code.qt.io/qt/qt5.git qt6-src
          cd qt6-src && perl init-repository --module-subset=qtbase && cd ..
          mkdir qt6-build && cd qt6-build
          call "${{ github.workspace }}\qt6-src\configure.bat" -static -release -prefix "${{ github.workspace }}\qt6-static" -no-pch -nomake examples -nomake tests -submodules qtbase
          cmake --build . --parallel --config Release
          cmake --install .
        timeout-minutes: 60

      - name: Install dependencies (Linux)

        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y zlib1g-dev libsqlite3-dev libgl1-mesa-dev

      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: brew install sqlite3

      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release -DCMAKE_PREFIX_PATH=${{ github.workspace }}/qt6-static ${{ matrix.cmake_extra }}

      - name: Build
        run: cmake --build build --config Release --parallel

      - name: Package (Linux/macOS)
        if: runner.os != 'Windows'
        run: |
          mkdir -p dist
          cp build/terrain_viewer dist/ 2>/dev/null || true
          tar -czf ${{ matrix.artifact }}.tar.gz -C dist .

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          mkdir -p dist
          cp build/Release/*.exe dist/ 2>/dev/null || true
          for exe in dist/*.exe; do windeployqt "$exe" 2>/dev/null || true; done
          7z a ${{ matrix.artifact }}.zip ./dist/*

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}.*

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true
