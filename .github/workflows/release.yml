name: Release

on:
  push:
    tags: ['v*']

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            name: linux-x86_64
            artifact: terrain-viewer-linux-x86_64
          - os: windows-latest
            name: windows-x86_64
            artifact: terrain-viewer-windows-x86_64
          - os: macos-14
            name: macos-arm64
            artifact: terrain-viewer-macos-arm64
            cmake_extra: -DCMAKE_OSX_ARCHITECTURES=arm64
          - os: macos-14
            name: macos-x86_64
            artifact: terrain-viewer-macos-x86_64
            cmake_extra: -DCMAKE_OSX_ARCHITECTURES=x86_64

    name: Build (${{ matrix.name }})
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Qt6
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.7.*'
          cache: true

      - name: Install dependencies (Linux)

        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y zlib1g-dev libsqlite3-dev libgl1-mesa-dev

      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: brew install sqlite3

      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release -DCMAKE_PREFIX_PATH=${{ env.Qt6_DIR }} ${{ matrix.cmake_extra }}

      - name: Build
        run: cmake --build build --config Release --parallel

      - name: Package (Linux)
        if: runner.os == 'Linux'
        run: |
          mkdir -p dist
          cp build/terrain_viewer dist/ 2>/dev/null || true;
          tar -czf ${{ matrix.artifact }}.tar.gz -C dist .

      - name: Package (macOS)
        if: runner.os == 'macOS'
        run: |
          mkdir -p dist
          APP=dist/TerrainViewer.app
          mkdir -p "$APP/Contents/MacOS"
          cp build/terrain_viewer "$APP/Contents/MacOS/" 2>/dev/null || true
          cat > "$APP/Contents/Info.plist" << 'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>CFBundleExecutable</key><string>terrain_viewer</string>
            <key>CFBundleName</key><string>TerrainViewer</string>
            <key>CFBundleIdentifier</key><string>com.lu-rebuilt.terrainviewer</string>
            <key>CFBundleVersion</key><string>1.0</string>
          </dict>
          </plist>
          PLIST
          macdeployqt "$APP" -verbose=1
          cd dist && zip -r ../${{ matrix.artifact }}.zip TerrainViewer.app

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          mkdir -p dist
          cp build/Release/*.exe dist/ 2>/dev/null || true
          for exe in dist/*.exe; do windeployqt "$exe" 2>/dev/null || true; done
          7z a ${{ matrix.artifact }}.zip ./dist/*

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}.*

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Generate release notes
        id: notes
        run: |
          CURRENT_TAG="${GITHUB_REF#refs/tags/}"
          PREV_TAG=$(git tag --sort=-creatordate | grep -A1 "^${CURRENT_TAG}$" | tail -1)
          TAG_MSG=$(git tag -l --format='%(contents)' "$CURRENT_TAG" | head -20)

          {
            echo 'BODY<<ENDOFNOTES'

            if [ -n "$TAG_MSG" ] && [ "$TAG_MSG" != "$CURRENT_TAG" ]; then
              echo "$TAG_MSG"
              echo ""
            fi

            if [ -n "$PREV_TAG" ] && [ "$PREV_TAG" != "$CURRENT_TAG" ]; then
              RANGE="${PREV_TAG}..${CURRENT_TAG}"
            else
              RANGE="HEAD~20..HEAD"
            fi

            COMMITS=$(git log "$RANGE" --pretty=format:"%s" --no-merges)

            BREAKING=$(echo "$COMMITS" | grep -E '^[a-z]+(\(.+\))?!: ' | sed 's/^/- /' || true)
            FEAT=$(echo "$COMMITS" | grep -E '^feat(\(.+\))?: ' | sed 's/^/- /' || true)
            FIX=$(echo "$COMMITS" | grep -E '^fix(\(.+\))?: ' | sed 's/^/- /' || true)
            PERF=$(echo "$COMMITS" | grep -E '^perf(\(.+\))?: ' | sed 's/^/- /' || true)
            DOCS=$(echo "$COMMITS" | grep -E '^docs(\(.+\))?: ' | sed 's/^/- /' || true)
            CI_BUILD=$(echo "$COMMITS" | grep -E '^(ci|build)(\(.+\))?: ' | sed 's/^/- /' || true)
            OTHER=$(echo "$COMMITS" | grep -vE '^(feat|fix|perf|docs|ci|build|style|refactor|test|chore|revert)(\(.+\))?!?: ' | sed 's/^/- /' || true)

            if [ -n "$BREAKING" ]; then
              echo "### ⚠ Breaking Changes"
              echo "$BREAKING"
              echo ""
            fi
            if [ -n "$FEAT" ]; then
              echo "### Features"
              echo "$FEAT"
              echo ""
            fi
            if [ -n "$FIX" ]; then
              echo "### Bug Fixes"
              echo "$FIX"
              echo ""
            fi
            if [ -n "$PERF" ]; then
              echo "### Performance"
              echo "$PERF"
              echo ""
            fi
            if [ -n "$DOCS" ]; then
              echo "### Documentation"
              echo "$DOCS"
              echo ""
            fi
            if [ -n "$CI_BUILD" ]; then
              echo "### Build & CI"
              echo "$CI_BUILD"
              echo ""
            fi
            if [ -n "$OTHER" ]; then
              echo "### Other Changes"
              echo "$OTHER"
              echo ""
            fi

            echo 'ENDOFNOTES'
          } >> "$GITHUB_OUTPUT"

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          body: ${{ steps.notes.outputs.BODY }}
